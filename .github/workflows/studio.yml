name: Studio CI

on:
  push:
    branches: [main, master]
    paths:
      - 'studio/**'
      - 'src/Weft.Core/**'
      - 'src/Weft.Auth/**'
      - 'src/Weft.Xmla/**'
      - 'src/Weft.Config/**'
      - '.github/workflows/studio.yml'
      - 'Directory.Build.props'
  pull_request:
    branches: [main, master]
    paths:
      - 'studio/**'
      - 'src/Weft.Core/**'
      - 'src/Weft.Auth/**'
      - 'src/Weft.Xmla/**'
      - 'src/Weft.Config/**'
      - '.github/workflows/studio.yml'
      - 'Directory.Build.props'

jobs:
  build-test:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'
      - name: Restore
        run: dotnet restore studio/weft-studio.sln
      - name: Build
        run: dotnet build studio/weft-studio.sln --no-restore --configuration Release -warnaserror
      - name: Test
        run: dotnet test studio/weft-studio.sln --no-build --configuration Release --logger "trx"
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: trx-${{ matrix.os }}
          path: 'studio/**/TestResults/*.trx'
